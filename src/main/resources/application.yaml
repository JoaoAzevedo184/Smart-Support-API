spring:
  application:
    name: smart-support-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/smartsupport}
    username: ${DB_USERNAME:smartsupport}
    password: ${DB_PASSWORD:smartsupport}

  jpa:
    hibernate:
      ddl-auto: validate # schema é gerido pelo Flyway, não pelo Hibernate
    open-in-view: false
    properties:
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Ollama é o provedor padrão (roda local, sem custo/credenciais de terceiros).
  # Para usar Gemini, ative o profile "gemini" (ver application-gemini.yaml).
  ai:
    model:
      chat: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_MODEL:llama3.2}
        options:
          temperature: 0.0

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  notifications:
    channel: ${NOTIFICATIONS_CHANNEL:log} # webhook | log | noop
    webhook-url: ${NOTIFICATIONS_WEBHOOK_URL:}
    webhook-timeout-ms: ${NOTIFICATIONS_WEBHOOK_TIMEOUT_MS:2000}
    webhook-retry-attempts: ${NOTIFICATIONS_WEBHOOK_RETRY_ATTEMPTS:2}
  classifier:
    strategy: ${CLASSIFIER_STRATEGY:rules} # rules | ai