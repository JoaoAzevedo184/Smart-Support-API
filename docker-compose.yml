services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-support-db
    environment:
      POSTGRES_DB: ${DB_NAME:-smartsupport}
      POSTGRES_USER: ${DB_USERNAME:-smartsupport}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartsupport}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-smartsupport} -d ${DB_NAME:-smartsupport}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: